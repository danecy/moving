<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EU City Lifestyle Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c14;
    --text: #d4d0c8;
    --text-bright: #f0ece4;
    --text-dim: #666;
    --text-dimmer: #555;
    --surface: rgba(255,255,255,0.02);
    --surface-hover: rgba(255,255,255,0.04);
    --city-color: #C4122E;
    --city-accent: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 800px; margin: 0 auto; }

  h1 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1.2;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  .city-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 28px 0;
  }

  .city-tab {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.04);
    color: #666;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    font-family: 'Source Serif 4', Georgia, serif;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
  }

  .city-tab:hover { background: rgba(255,255,255,0.07); }

  .city-tab.active {
    font-weight: 700;
    color: #fff;
  }

  .city-header {
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    border-left: 4px solid var(--city-color);
    transition: all 0.3s ease;
  }

  .city-title-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }

  .city-title-row .flag { font-size: 32px; }

  .city-title-row h2 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .city-title-row .country {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
  }

  .best-for {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    font-style: italic;
    color: var(--city-accent);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .ratings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  @media (max-width: 500px) {
    .ratings-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .rating-item label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
  }

  .dots { display: flex; gap: 3px; align-items: center; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    transition: background 0.3s ease;
  }
  .dot.filled { background: var(--city-accent); }

  .pace-row {
    margin-top: 12px;
  }
  .pace-row label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pace-row .value {
    font-size: 13px;
    color: #aaa;
    margin-top: 2px;
  }

  .section-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .section-tab {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.03);
    color: var(--text-dimmer);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s ease;
  }

  .section-tab:hover { background: rgba(255,255,255,0.06); }

  .section-tab.active {
    color: var(--city-accent);
  }

  .content-block {
    background: var(--surface);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
    line-height: 1.8;
  }

  .content-block p {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    color: #c8c4ba;
  }

  .honest-block {
    background: rgba(255,100,100,0.04);
    border-radius: 12px;
    padding: 20px;
    border-left: 3px solid rgba(255,100,100,0.3);
    margin-bottom: 32px;
  }

  .honest-block .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #c55;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .honest-block p {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 14px;
    color: #a89;
    line-height: 1.7;
  }

  .all-cities {
    background: var(--surface);
    border-radius: 12px;
    padding: 20px;
  }

  .all-cities h3 {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .city-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    width: 100%;
    margin-bottom: 8px;
  }

  .city-row:hover { background: rgba(255,255,255,0.05); }

  .city-row .flag { font-size: 18px; flex-shrink: 0; }

  .city-row .info { flex: 1; min-width: 0; }

  .city-row .name {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 14px;
    font-weight: 600;
    color: #999;
  }

  .city-row .pace-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 2px;
  }

  .city-row .summary {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 11px;
    font-style: italic;
    color: var(--text-dim);
    text-align: right;
    max-width: 300px;
  }

  @media (max-width: 600px) {
    .city-row .summary { display: none; }
  }

  .fade-in {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  <div class="honest-block" id="honestBlock"></div>

  <div class="all-cities">
    <h3>All cities at a glance</h3>

  </div>
</div>

    honest: "Bureaucracy will test your patience. Summers are brutally hot (35°C+). Tech salaries are lower than Northern Europe. The 'mañana' attitude is charming until you need something done by a deadline.",
    sections: {
      daily: "Your day starts around 9. Coffee at the corner bar — a cortado and maybe a tostada con tomate for €3. You walk to your home office through streets that are already buzzing. Lunch is the main event: a proper sit-down at 2pm, maybe a menú del día for €12–15 with wine included. Nobody rushes. The afternoon stretches. Dinner doesn't start until 9:30 or 10, and it's totally normal to be out at a terraza on a Tuesday at 11pm. The rhythm is slow, social, and outdoor. You'll eat better here for less money than anywhere else on this list.",
      couple: "Madrid is built for couples who like to eat, drink, and wander. The terraza culture means you're always sitting outside somewhere with a glass of Ribera del Duero. Weekends are for the Rastro flea market, Retiro Park, or a day trip to Segovia or Toledo. The food markets (Mercado de San Fernando, Mercado de la Paz) are incredible for cooking at home. Late 30s/early 40s crowd thrives in neighborhoods like Chamberí, Almagro, and the quieter parts of Malasaña — places with character but without the tourist chaos. The social scene is warm and easy; Spaniards genuinely integrate you into their lives once you're in.",
      culture: "Madrid has a particular energy — it's confident without being showy. World-class museums (Prado, Reina Sofía, Thyssen) that you'll actually revisit. Flamenco venues that range from tourist traps to deeply authentic tablaos. The nightlife is legendary but you don't have to participate — there's a whole ecosystem of wine bars, jazz spots, and quiet neighborhood places. The city has real seasons: hot dry summers, crisp winters, gorgeous springs. 300+ days of sunshine. The light is extraordinary.",
      social: "Spanish is essential for real integration — you'll get by without it, but you'll be stuck in the expat bubble. The good news: Marinés being a native speaker changes everything here. Spaniards socialize late and slowly build deep friendships. The culture is physical (cheek kisses, close talking) and emotionally warm. Expect bureaucratic frustration — the paperwork never ends — but people are genuinely helpful once you're face to face. Madrid has a large and growing international community (~29% of residents), but it hasn't lost its Spanish soul.",
      escape: "Sierra de Guadarrama mountains (45 min), Segovia, Toledo, Ávila are all day-trip distance. Cheap flights everywhere in Europe. The AVE high-speed train gets you to Barcelona in 2.5 hours, Seville in 2.5 hours. Wine regions (Ribera del Duero, Rueda, La Mancha) are all within a couple hours."

  {
    name: "Barcelona", country: "Spain", flag: "🇪🇸",
    color: "#004D98", accent: "#5cb8ff",

    pace: "Mediterranean, beach-influenced",

    sections: {
      daily: "Similar Spanish rhythm to Madrid but with the beach layered in. You might start the day with a swim at Barceloneta before work. The same late lunch and late dinner culture applies, but Barcelona has a slightly more Mediterranean ease — less intensity than Madrid's capital-city energy. Catalan culture adds a layer: the language, the independence politics, the distinct food traditions. Vermut hour on Sunday mornings is sacred. The Gothic Quarter and Eixample give you that old-European-city-on-foot experience. But the tourism pressure is real and relentless in the center.",
      couple: "The beach-city combo is Barcelona's killer feature. You can have a morning meeting, bike to lunch in Gràcia, and be on the sand by 5pm. The food scene is different from Madrid — more seafood-forward, more Catalan traditions (pa amb tomàquet, escalivada, fideuà). The neighborhoods have strong identities: Gràcia feels like a village, Sant Antoni is the cool-kid brunch spot, Poblenou is the tech/creative hub. For a couple in their 40s, Gràcia or upper Eixample gives you the right balance of life and calm.",

    sections: {
      daily: "Brussels runs on a more Northern European schedule — earlier dinners, earlier bedtimes. But the EU bubble gives it a strange international energy that's hard to find elsewhere. Your daily life revolves around your commune (neighborhood): Ixelles for the expat scene, Saint-Gilles for bohemian vibes, Uccle for quiet residential life. The beer culture is extraordinary — not in a frat-party way, but in a \"there are 1,500 unique beers and every one has its own glass\" way. Frites stands are on every corner. The weather is honestly rough — grey, rainy, and cold for much of the year.",
      couple: "Brussels works for couples who are self-contained and don't need the city to constantly entertain them. The restaurant scene punches way above its weight — Belgium has more Michelin stars per capita than France. Weekend markets at Place du Jeu de Balle, beer tastings, museum hopping (Magritte Museum, Art & History). The city is compact enough that you can bike or tram everywhere. But it lacks the natural warmth of Southern European cities — your social life will lean heavily on the expat community rather than integrating with Belgians, who can be reserved.",

  },
  {

    foodDrink: 4, walkability: 5, weather: 2, socialWarmth: 3, languageBarrier: 3, culturalDepth: 4,
    pace: "Compact, village-in-a-city feel",
    bestFor: "Couples who want charm, design culture, and a human-scale city",
    honest: "It's small — if you need big-city energy, you'll get restless. The tech job market is limited. The weather is the same grey Belgian reality. Dutch is expected for real integration.",
    sections: {
      daily: "Antwerp has the charm that Brussels lacks. It's a compact, walkable city with beautiful Flemish architecture, a thriving fashion and design scene, and a more cohesive identity than Brussels. Daily life is pleasant — great bakeries, excellent restaurants for a city this size, a diamond district that adds a unique international flavor. The Flemish culture is more orderly and clean than francophone Brussels. Shops close earlier, people eat dinner earlier (7–8pm), and Sundays are quiet. The port gives the city a working-class backbone underneath the fashion-world polish.",

    bestFor: "Couples who want world-class culture, total English accessibility, and bike-centric life",
    honest: "The housing market is brutal. The weather will get to you — it's grey and wet for 6+ months. The city can feel small and repetitive after a couple of years. Dutch directness can read as rudeness if you're not prepared. Summers are short but magical.",
    sections: {
      daily: "You will bike everywhere. This isn't optional — it's the fundamental mode of existence. Rain, wind, groceries, dress clothes: you bike. The city is small and canal-gridded, and within a few months you'll know every shortcut. Daily life has a cozy, gezellig quality — the Dutch concept of convivial warmth. Coffee culture is strong (not espresso-focused like Spain, more filter/specialty). Dinner is early by Southern European standards (6:30–7:30pm). Borrel (after-work drinks with snacks) is the social ritual. The city is gorgeous but compact — you'll see the same faces, the same streets, and that intimacy is either comforting or claustrophobic.",
      couple: "Amsterdam is fantastic for an active, outdoorsy couple. Biking along the canals, weekend trips to the Vondelpark, exploring different neighborhoods (De Pijp for the Albert Cuyp market, Jordaan for boutiques, Amsterdam-Noord for the creative/industrial scene). The food scene has evolved massively — great Indonesian, Surinamese, and modern Dutch restaurants. The city is incredibly liberal and tolerant. For a couple without kids, the nightlife and cultural calendar are endless: Concertgebouw for classical music, Paradiso and Melkweg for live music, world-class museums (Rijksmuseum, Stedelijk, Van Gogh). But the housing crisis is real — finding a good apartment is genuinely difficult and expensive.",

      escape: "Haarlem (15 min), Utrecht (30 min), The Hague/beach (45 min), Rotterdam (40 min). Schiphol is one of Europe's best-connected airports. Belgium, Germany, and the North Sea coast are all within easy reach. The Dutch countryside (polders, windmills, Texel island) is surprisingly beautiful."
    }
  },
  {
    name: "Rotterdam", country: "Netherlands", flag: "🇳🇱",
    color: "#009739", accent: "#5cd6a0",
    foodDrink: 4, walkability: 4, weather: 2, socialWarmth: 3, languageBarrier: 5, culturalDepth: 4,
    pace: "Creative, gritty, modern",
    bestFor: "Couples who prefer creative energy over prettiness and want a real working city",
    honest: "It's not as charming as Amsterdam — that's by design, but it matters on grey November days. The architecture is love-it-or-hate-it. Some neighborhoods feel disconnected. The nightlife doesn't match Amsterdam's range.",
    sections: {
      daily: "Rotterdam feels like a different country from Amsterdam. Bombed flat in WWII and rebuilt with bold modern architecture, it has a gritty, creative energy. The Markthal is the city's food cathedral. The port is Europe's largest and gives the city an industrial backbone. Daily life is similar to Amsterdam — biking, borrel, early dinners — but with a more diverse, working-class edge. The neighborhoods are more spread out and less picturesque than Amsterdam's canal ring, but also less tourist-saturated. You actually feel like you live in a real city rather than a living museum.",
      couple: "Rotterdam is the city for couples who find Amsterdam too precious. The food scene is surprisingly good (Indonesian, Surinamese, Turkish, modern Dutch). The Witte de Withstraat area is the cultural spine — galleries, bars, restaurants. The architecture nerd in you will be constantly stimulated (Cube Houses, Erasmus Bridge, Depot Boijmans). Weekend activities: Fenix Food Factory, biking along the Maas, exploring the Delfshaven historic quarter (the one old area that survived the bombing). The Katendrecht neighborhood has gone from dodgy port district to one of the coolest spots in the Netherlands.",

    sections: {
      daily: "The Hague is the most underrated city on this list. It has the beach (Scheveningen), the international institutions, the royal palaces, and a surprisingly vibrant restaurant and bar scene. Daily life feels more residential and less hectic than Amsterdam. You bike everywhere (it's the Netherlands), but the pace is calmer. The Grote Markt area is the social hub. The international community is well-established thanks to the embassies, the International Court of Justice, and various NGOs. It's a city that feels like it has its life figured out.",

const sectionLabels = {
  daily: "A Day Here",
  couple: "Couple Life",
  culture: "Culture & Vibe",
  social: "Making Friends",
  escape: "Weekend Escapes"
};

const ratingLabels = {
  foodDrink: "Food & Drink",
  walkability: "Walkability",
  weather: "Weather",
  socialWarmth: "Social Warmth",
  languageBarrier: "English Ease",
  culturalDepth: "Cultural Depth"
};

let activeCity = 0;
let activeSection = "daily";

function makeDots(value, color) {
  return [1,2,3,4,5].map(i =>
    `<div class="dot${i <= value ? ' filled' : ''}" style="${i <= value ? 'background:' + color : ''}"></div>`
  ).join('');
}

function render() {
  const city = cities[activeCity];

  // Set CSS variables
  document.documentElement.style.setProperty('--city-color', city.color);
  document.documentElement.style.setProperty('--city-accent', city.accent);

  // City tabs
  document.getElementById('cityTabs').innerHTML = cities.map((c, idx) =>
    `<button class="city-tab${idx === activeCity ? ' active' : ''}"
      style="${idx === activeCity ? 'background:' + c.color + ';' : ''}"
      onclick="setCity(${idx})">${c.flag} ${c.name}</button>`
  ).join('');

  // City header
  document.getElementById('cityHeader').innerHTML = `
    <div class="fade-in" style="background: linear-gradient(135deg, ${city.color}15, ${city.color}08);">
      <div class="city-title-row">
        <span class="flag">${city.flag}</span>
        <h2>${city.name}</h2>
        <span class="country">${city.country}</span>
      </div>
      <div class="best-for">${city.bestFor}</div>
      <div class="ratings-grid">
        ${Object.entries(ratingLabels).map(([key, label]) => `
          <div class="rating-item">
            <label>${label}</label>
            <div class="dots">${makeDots(city[key], city.accent)}</div>
          </div>
        `).join('')}
      </div>
      <div class="pace-row">
        <label>Pace</label>
        <div class="value">${city.pace}</div>
      </div>
    </div>
  `;
  document.getElementById('cityHeader').style.borderLeftColor = city.color;
  document.getElementById('cityHeader').style.background = `linear-gradient(135deg, ${city.color}15, ${city.color}08)`;

  // Section tabs
  document.getElementById('sectionTabs').innerHTML = Object.entries(sectionLabels).map(([id, label]) =>
    `<button class="section-tab${id === activeSection ? ' active' : ''}"
      style="${id === activeSection ? 'border-color:' + city.accent + '40; background:' + city.accent + '12; color:' + city.accent : ''}"
      onclick="setSection('${id}')">${label}</button>`
  ).join('');

  // Content
  document.getElementById('contentBlock').innerHTML =
    `<p class="fade-in">${city.sections[activeSection]}</p>`;

  // Honest take
  document.getElementById('honestBlock').innerHTML = `
    <div class="label">The honest take</div>
    <p>${city.honest}</p>
  `;

  // All cities
  document.getElementById('allCities').innerHTML = cities.map((c, idx) => `
    <button class="city-row" onclick="setCity(${idx}); window.scrollTo({top:0,behavior:'smooth'})"
      style="${idx === activeCity ? 'background:' + c.color + '18' : ''}">
      <span class="flag">${c.flag}</span>
      <div class="info">
        <div class="name" style="${idx === activeCity ? 'color:' + c.accent : ''}">${c.name}</div>
        <div class="pace-label">${c.pace}</div>
      </div>
      <div class="summary">${c.bestFor}</div>
    </button>
  `).join('');
}

function setCity(idx) {
  activeCity = idx;
  activeSection = "daily";
  render();
}

function setSection(id) {
  activeSection = id;
  render();
}

render();
</script>
</body>
</html>
